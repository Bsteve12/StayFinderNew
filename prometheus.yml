global:
  scrape_interval: 15s # By default, scrape targets every 15 seconds.

scrape_configs:
  - job_name: 'spring-boot-backend'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      # host.docker.internal allows Prometheus inside the container to reach the host machine where the Spring Boot app is running locally
      - targets: ['host.docker.internal:8080']
