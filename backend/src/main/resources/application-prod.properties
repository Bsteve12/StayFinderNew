# ==============================
# CONFIGURACION BASE DE DATOS
# ==============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ==============================
# CONFIGURACION HIBERNATE
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ==============================
# JWT (Doble mapeo para evitar errores)
# ==============================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
jwt.key=${JWT_SECRET}
jwt.tokenExpiration=${JWT_EXPIRATION}

# ==============================
# SERVIDOR (Ajustado para Google Cloud)
# ==============================
# Usamos PORT que es la que Google exige, con 8080 como respaldo
server.port=${PORT:8080}

# ==============================
# CONFIGURACION CORREO
# ==============================
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=stayfinder0@gmail.com
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=true

# ==============================
# GOOGLE OAUTH
# ==============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email