JWT_SECRET=dummysecretkeythatislongenoughforhmacsha256encryption
JWT_EXPIRATION=86400000
GOOGLE_CLIENT_ID=dummy
GOOGLE_CLIENT_SECRET=dummy
MAIL_PASSWORD=dummy
