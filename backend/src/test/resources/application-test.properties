jwt.secret=a9c4e7f2b1846f0dd53f91b7e3d29c6af872e54d3bbf901c48e61f7d25a03c9d
jwt.key=a9c4e7f2b1846f0dd53f91b7e3d29c6af872e54d3bbf901c48e61f7d25a03c9d
jwt.tokenExpiration=86400000
jwt.expiration=86400000

# ==============================
# VALORES DUMMY
# ==============================
DB_URL=jdbc:h2:mem:testdb
