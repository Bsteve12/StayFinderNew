name: CI/CD Pipeline - StayFinder

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  BACKEND_SERVICE: stayfinder-backend
  FRONTEND_SERVICE: stayfinder-frontend
  TESTRAIL_URL: ${{ secrets.TESTRAIL_URL }}
  TESTRAIL_USER: ${{ secrets.TESTRAIL_USER }}
  TESTRAIL_API_KEY: ${{ secrets.TESTRAIL_API_KEY }}

jobs:
  qa-testrail:
    name: QA Automation & TestRail Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x ./backend/mvnw

      - name: Run Backend Tests (JUnit 5 -> TestRail)
        working-directory: ./backend
        run: ./mvnw test -Dspring.profiles.active=test
        continue-on-error: true

  build-and-deploy:
    name: Build & Deploy to Google Cloud Run
    needs: qa-testrail
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Authorize Docker push
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev

      # BACKEND
      - name: Build Backend Docker Image
        working-directory: ./backend
        run: docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/${{ env.BACKEND_SERVICE }}:${{ github.sha }} .

      - name: Push Backend Image
        run: docker push ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/${{ env.BACKEND_SERVICE }}:${{ github.sha }}

      - name: Deploy Backend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v1
        with:
          service: ${{ env.BACKEND_SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/${{ env.BACKEND_SERVICE }}:${{ github.sha }}
          env_vars: |
            SPRING_PROFILES_ACTIVE=prod

      # FRONTEND
      - name: Build Frontend Docker Image
        working-directory: ./frontend
        run: docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/${{ env.FRONTEND_SERVICE }}:${{ github.sha }} .

      - name: Push Frontend Image
        run: docker push ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/${{ env.FRONTEND_SERVICE }}:${{ github.sha }}

      - name: Deploy Frontend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v1
        with:
          service: ${{ env.FRONTEND_SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/${{ env.FRONTEND_SERVICE }}:${{ github.sha }}
